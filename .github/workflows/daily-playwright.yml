name: Daily Playwright Automation

on:
  # Runs every day at 9:00 AM IST (3:30 AM UTC)
  schedule:
    - cron: '30 3 * * *'

  # Lets you run it manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  playwright-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get your code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Install project dependencies
      - name: Install Dependencies
        run: npm ci

      # Step 4: Install Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # Step 5: Run all Playwright tests
      - name: Run Playwright Tests
        run: npx playwright test

      # Step 6: Upload the HTML report (even if tests fail)
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Playwright-Report
          path: playwright-report