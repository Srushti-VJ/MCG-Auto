name: Daily Playwright Automation

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  playwright-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npx playwright test
        continue-on-error: true

      - name: Extract Test Results
        id: results
        if: always()
        run: |
          if [ -f test-results.json ]; then
            node -e "
              const r = require('./test-results.json');
              const s = r.stats;
              const passed  = s.expected   || 0;
              const failed  = s.unexpected || 0;
              const skipped = s.skipped    || 0;
              const total   = passed + failed + skipped;
              console.log('passed='  + passed);
              console.log('failed='  + failed);
              console.log('skipped=' + skipped);
              console.log('total='   + total);
              console.log('status='  + (failed > 0 ? 'FAILED' : 'PASSED'));
            " >> $GITHUB_OUTPUT
          else
            echo "passed=0"  >> $GITHUB_OUTPUT
            echo "failed=0"  >> $GITHUB_OUTPUT
            echo "skipped=0" >> $GITHUB_OUTPUT
            echo "total=0"   >> $GITHUB_OUTPUT
            echo "status=UNKNOWN" >> $GITHUB_OUTPUT
          fi

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Playwright-Report
          path: playwright-report

      - name: Send Email Notification
        if: always()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "MCG Automation [${{ steps.results.outputs.status }}] — Run #${{ github.run_number }}"
          to: srushti.jadhav@atriina.com
          from: MCG Automation <${{ secrets.GMAIL_USERNAME }}>
          body: |
            Daily Playwright Test Run — MCG Website
            =========================================

            Status  : ${{ steps.results.outputs.status }}
            Passed  : ${{ steps.results.outputs.passed }}
            Failed  : ${{ steps.results.outputs.failed }}
            Skipped : ${{ steps.results.outputs.skipped }}
            Total   : ${{ steps.results.outputs.total }}

            View run details & download the HTML report:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            (Click the link above → open the "Playwright-Report" artifact for the full HTML report)
